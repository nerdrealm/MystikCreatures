<!DOCTYPE html>
<html lang="en">
<head>
  <title>Mystik Creatures – News & Updates</title>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    :root {
      --bg: #05070b;
      --bg-panel: #0b0f19;
      --bg-panel-soft: #101522;
      --accent: #4fd1c5;
      --accent-soft: rgba(79, 209, 197, 0.12);
      --text-main: #f7fafc;
      --text-muted: #a0aec0;
      --border-subtle: #2d3748;
      --radius-lg: 18px;
      --radius-sm: 10px;
      --shadow-soft: 0 24px 60px rgba(0, 0, 0, 0.7);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: radial-gradient(circle at top, #141824 0, #05070b 55%);
      color: var(--text-main);
      min-height: 100vh;
      display: flex;
    }
    /* --- SIDEBAR --- */
    .sidebar {
      width: 260px;
      background: linear-gradient(180deg, #05070c, #05070b);
      border-right: 1px solid #1a202c;
      padding: 1.5rem 1rem;
      position: sticky;
      top: 0;
      max-height: 100vh;
      overflow-y: auto;
    }
    .sidebar h1 { margin: 0 0 0.3rem; font-size: 1.2rem; letter-spacing: 0.12em; text-transform: uppercase; }
    
    .sidebar-powers { text-align: center; margin: 0.5rem 0 1rem 0; padding: 0 0.5rem; }
    .sidebar-powers img { max-width: 85%; height: auto; display: block; margin: 0 auto; }

    .sidebar-logo-bottom { text-align: center; margin-top: 1rem; margin-bottom: 1rem; padding: 0 0.5rem; }
    .sidebar-logo-bottom img { max-width: 100%; height: auto; display: block; margin: 0 auto; filter: drop-shadow(0 4px 6px rgba(0,0,0,0.5)); }

    .sidebar-nav { margin-top: 1.5rem; display: flex; flex-direction: column; gap: 0.25rem; }
    .sidebar-nav a {
      padding: 0.45rem 0.7rem;
      border-radius: 999px;
      text-decoration: none;
      color: var(--text-muted);
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      border: 1px solid transparent;
      transition: all 0.12s ease-out;
    }
    .sidebar-nav a:hover {
      border-color: rgba(79, 209, 197, 0.7);
      color: var(--text-main);
      background: rgba(15, 23, 42, 0.9);
    }
    .sidebar-nav a.active {
      background: var(--accent-soft);
      border-color: rgba(79, 209, 197, 0.9);
      color: var(--accent);
    }

    /* --- MAIN CONTENT --- */
    .main {
      flex: 1;
      padding: 1.5rem 1.5rem 2.5rem;
      max-width: calc(100% - 260px);
      background: #ffffff;
    }
    .main-inner {
      max-width: 1000px;
      margin: 0 auto;
    }
    section {
      background: transparent;
      border-radius: 0;
      border: none;
      box-shadow: none;
      padding: 0;
      min-height: 80vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    h2 {
      margin: 0 0 1.5rem;
      font-size: 1.5rem;
      letter-spacing: 0.09em;
      text-transform: uppercase;
      color: #1877f2;
      border-bottom: none;
      width: 100%;
      padding-bottom: 1rem;
      text-align: left;
    }

    @media (max-width: 800px) {
      body { flex-direction: column; }
      .sidebar { width: 100%; position: static; max-height: none; border-right: none; border-bottom: 1px solid #1a202c; }
      .main { max-width: 100%; padding: 1rem 1rem 2rem; }
    }
  </style>
</head>
<body>

  <aside class="sidebar">
    <h1>
      <a href="index.html" style="text-decoration:none; color:inherit; display:block;">
        Mystik Creatures
      </a>
    </h1>

    <div class="sidebar-powers">
      <img src="Powers.png" alt="Elemental Powers">
    </div>

    <nav class="sidebar-nav">
      <a href="index.html">Overview</a>
      <a href="card_list.html">Card list</a>
      <a href="search.html">Search by name</a>
      <a href="compare.html">Compare cards</a>
      <a href="deck_builder.html">Deck Builder</a>
      <a href="https://www.royalroad.com/fiction/142593/the-last-concordant" target="_blank" rel="noopener noreferrer" style="color: #feebc8;">
        The Last Concordant
      </a>
      <a href="news.html" class="active">News/Updates</a>
    </nav>

    <div class="sidebar-logo-bottom">
      <img src="MystikLogo-PNG.png" alt="Mystik Creatures Logo">
    </div>
  </aside>

  <main class="main">
    <div class="main-inner">
      <section>
        <h2>Latest News & Updates</h2>
        
        <!-- FACEBOOK WIDGET CONTAINER -->
        <div class="sk-ww-facebook-page-posts" data-embed-id="25632952"></div><script src="https://widgets.sociablekit.com/facebook-page-posts/widget.js" defer></script>
      </section>
    </div>
  </main>
  
  <script src="footer.js"></script>
</body>
</html>
