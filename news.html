<head>
  <title>Mystik Creatures™ – News & Updates</title>

  <style>
    :root {
      --bg: #05070b;
      --bg-panel: #0b0f19;
      --bg-panel-soft: #101522;
      --accent: #4fd1c5;
      --accent-soft: rgba(79, 209, 197, 0.12);
      --text-main: #f7fafc;
      --text-muted: #a0aec0;
      --border-subtle: #2d3748;
      --radius-lg: 18px;
      --radius-sm: 10px;
      --shadow-soft: 0 24px 60px rgba(0, 0, 0, 0.7);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: radial-gradient(circle at top, #141824 0, #05070b 55%);
      color: var(--text-main);
      min-height: 100vh;
      display: flex;
    }
    /* --- SIDEBAR --- */
    .sidebar {
      width: 270px; /* FIXED: Was 260px */
      background: linear-gradient(180deg, #05070c, #05070b);
      border-right: 1px solid #1a202c;
      padding: 1.5rem 1rem;
      position: sticky;
      top: 0;
      max-height: 100vh;
      overflow-y: auto;
    }
    .sidebar h1 { 
      margin: 0 0 0.3rem; 
      font-size: 1.2rem; 
      letter-spacing: 0.12em; 
      text-transform: uppercase; 
    }
    
    .sidebar-powers { 
      text-align: center; 
      margin: 0.5rem 0 1.5rem 0; /* FIXED: Was 1rem bottom margin */
      padding: 0 0.5rem; 
    }
    .sidebar-powers img { 
      max-width: 60%; /* FIXED: Was 85% */
      height: auto; 
      display: block; 
      margin: 0 auto; 
    }

    .sidebar-logo-bottom { text-align: center; margin-top: -1rem; margin-bottom: 1rem; padding: 0 0.5rem; }
    .sidebar-logo-bottom img { max-width: 100%; height: auto; display: block; margin: 0 auto; filter: drop-shadow(0 4px 6px rgba(0,0,0,0.5)); }

    .sidebar-nav { margin-top: 1.5rem; display: flex; flex-direction: column; gap: 0.25rem; }
    .sidebar-nav a {
      padding: 0.45rem 0.7rem;
      border-radius: 999px;
      text-decoration: none;
      color: var(--text-muted);
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      border: 1px solid transparent;
      transition: all 0.12s ease-out;
    }
    .sidebar-nav a:hover {
      border-color: rgba(79, 209, 197, 0.7);
      color: var(--text-main);
      background: rgba(15, 23, 42, 0.9);
    }
    .sidebar-nav a.active {
      background: var(--accent-soft);
      border-color: rgba(79, 209, 197, 0.9);
      color: var(--accent);
    }

    /* --- MAIN CONTENT --- */
    .main {
      flex: 1;
      padding: 1.5rem 1.5rem 2.5rem;
      max-width: calc(100% - 260px);
      background: #ffffff;
    }
    .main-inner {
      max-width: 1000px;
      margin: 0 auto;
    }
    section {
      background: transparent;
      border-radius: 0;
      border: none;
      box-shadow: none;
      padding: 0;
      min-height: 80vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    h2 {
      margin: 0 0 1.5rem;
      font-size: 1.5rem;
      letter-spacing: 0.09em;
      text-transform: uppercase;
      color: #1877f2;
      border-bottom: none;
      width: 100%;
      padding-bottom: 1rem;
      text-align: left;
    }

    @media (max-width: 800px) {
      body { flex-direction: column; }
      .sidebar { width: 100%; position: static; max-height: none; border-right: none; border-bottom: 1px solid #1a202c; }
      .main { max-width: 100%; padding: 1rem 1rem 2rem; }
    }
    /* --- MOBILE OPTIMIZATION --- */
    
    /* 1. Mobile Label (Hidden on Desktop) */
    .mobile-label { display: none; }

    @media (max-width: 800px) {
      body { flex-direction: column; }
      .sidebar { width: 100%; position: static; max-height: none; border-right: none; border-bottom: 1px solid #1a202c; }
      .main { max-width: 100%; padding: 1rem 1rem 2rem; }

      /* Force table elements to behave like blocks */
      .table-wrapper { max-height: none; border: none; overflow: visible; }
      table, thead, tbody, th, td, tr { display: block; }
      
      /* Hide Table Headers */
      thead tr { position: absolute; top: -9999px; left: -9999px; }
      
      /* Style the Row as a "Card" */
      tbody tr { 
        background: var(--bg-panel-soft);
        margin-bottom: 1.5rem; 
        border-radius: 12px;
        border: 1px solid var(--border-subtle);
        padding: 1.25rem;
        box-shadow: 0 4px 6px rgba(0,0,0,0.3);
      }

      /* Style the Cells */
      td { 
        border: none;
        border-bottom: 1px solid rgba(255,255,255,0.05); 
        padding: 0.5rem 0;
        text-align: left !important;
        width: 100%;
        display: flex;
        justify-content: space-between;
        align-items: center;
        flex-wrap: wrap; 
      }
      td:last-child { border-bottom: none; }

      /* Reveal Labels */
      .mobile-label {
        display: inline-block;
        font-weight: 700;
        color: var(--accent);
        text-transform: uppercase;
        font-size: 0.75rem;
        letter-spacing: 0.05em;
        margin-right: 10px;
        min-width: 80px; 
      }

      /* Name & Image (First Cell) */
      td:first-child {
        display: flex;
        flex-direction: column;
        align-items: center;
        text-align: center !important;
        border-bottom: 1px solid var(--border-subtle);
        margin-bottom: 1rem;
        padding-bottom: 1rem;
      }
      td:first-child .mobile-label { display: none; } /* Hide label for name */
      
      td:first-child div { font-size: 1.3rem !important; margin-bottom: 10px; }
      .card-thumbnail { max-height: 200px; width: auto; }

      /* Details Block */
      td:nth-child(5) { 
          display: block; 
          margin-top: 0.5rem;
          background: rgba(0,0,0,0.2);
          padding: 10px;
          border-radius: 8px;
      }
      td:nth-child(5) .mobile-label {
          display: block;
          margin-bottom: 5px;
          border-bottom: 1px solid #333;
          padding-bottom: 2px;
          width: 100%;
      }
      
      .detail-text { text-align: left; }
    }

    /* --- MOBILE MENU CSS (FINAL FIX) --- */

    /* 1. Import the Font (Restores the cool text style) */
    @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&display=swap');

    /* 2. Hide button on Desktop */
    #mobile-menu-btn { display: none; }

    /* 3. Mobile Specific Styles */
    @media (max-width: 800px) {
      
      /* THE BUTTON (Closed State - Top Left) */
      #mobile-menu-btn {
        display: flex;
        align-items: center;
        justify-content: center;
        position: fixed;
        top: 15px;
        left: 15px;
        z-index: 10001; /* Above sidebar */
        width: 32px;
        height: 32px;
        font-size: 20px;
        background-color: #4fd1c5;
        color: #05070b;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        transition: all 0.3s ease;
      }

      /* THE BUTTON (Open State - Top Right of Sidebar) */
      #mobile-menu-btn.btn-open {
        /* This moves the X to the top-right corner of the menu */
        left: 220px; 
        background-color: #f56565 !important;
        color: white !important;
      }

      /* THE SIDEBAR */
      .sidebar {
        position: fixed !important;
        top: 0;
        left: 0;
        height: 100vh;
        width: 270px !important;
        z-index: 10000;
        background: #05070b;
        box-shadow: 5px 0 15px rgba(0,0,0,0.7);
        border-right: none;
        border-bottom: 1px solid #1a202c;
        overflow-y: auto;
        padding-top: 1rem; /* Standard padding */
        
        transform: translateX(-100%);
        transition: transform 0.3s ease;
      }
      
      .sidebar.mobile-open {
        transform: translateX(0);
      }

      /* --- FIXING THE TEXT AND FONT --- */
      .sidebar h1 {
        font-family: 'Cinzel', serif !important; /* Restores your font */
        font-size: 1.6rem !important;
        text-align: center;
        margin-top: 10px;
        margin-bottom: 20px;
        line-height: 1.3;
        
        /* This forces "MYSTIK" and "CREATURES" onto separate lines */
        word-spacing: 100vw; 
        
        /* Ensures the text doesn't hit the X button */
        padding-right: 20px; 
        padding-left: 20px;
      }
      
      .main {
        padding-top: 60px !important; 
      }
    }

  </style>
</head>
